name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -A Win32 "-DWRATHCLASSICAPI_TAG=${{ github.ref_name }}"

      - name: Build
        run: cmake --build build --config Release

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Release/WrathClassicAPI.dll
